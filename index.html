<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Poppins',sans-serif;background:#0b1220;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
        .form-wrapper{width:min(540px,100%);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:28px;padding:32px;backdrop-filter:blur(14px);box-shadow:0 30px 80px rgba(0,0,0,0.25);}
        .form-wrapper h1{font-size:2rem;margin-bottom:18px;color:#60a5fa;}
        .form-wrapper p{color:#cbd5e1;line-height:1.8;margin-bottom:24px;}
        .form-wrapper form{display:grid;gap:16px;}
        .form-wrapper input,.form-wrapper textarea{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.06);color:#eef2ff;font-size:1rem;outline:none;}
        .form-wrapper textarea{min-height:150px;resize:vertical;}
        .form-wrapper input::placeholder,.form-wrapper textarea::placeholder{color:#94a3b8;}
        .form-wrapper button{padding:16px 18px;border:none;border-radius:16px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);color:white;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease;}
        .form-wrapper button:hover{transform:translateY(-2px);box-shadow:0 16px 30px rgba(96,165,250,0.25);}
    </style>
</head>
<body>
    <div class="form-wrapper">
        <h1>Contacto</h1>
        <p>Completa el siguiente formulario para enviarme un mensaje directo.</p>
        <form action="https://formspree.io/f/mwvyjpgj" method="POST">
            <input type="text" name="nombre" placeholder="Tu nombre" required>
            <input type="email" name="email" placeholder="Tu correo electrÃ³nico" required>
            <input type="text" name="asunto" placeholder="Asunto" required>
            <textarea name="mensaje" placeholder="Escribe tu mensaje..." required></textarea>
            <button type="submit">Enviar mensaje</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>

    <style>
        body{
            background-color:#f0f0f0;
            font-family:Arial;
            text-align:center;
        }

        .perfil{
            background:white;
            width:300px;
            margin:auto;
            margin-top:50px;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px gray;
        }

        img{
            width:150px;
            border-radius:50%;
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
        }
    </style>
</head>
<body>

    <div class="perfil">

        <img src="https://via.placeholder.com/150" alt="Foto">

        <h1>Tu Nombre</h1>

        <p>Estudiante de Desarrollo de Software</p>

        <p>Me gusta la programación y aprender nuevas tecnologías.</p>

    </div>

</body>
</html>
